schema_version: "0.3.0"
record_type: origin_trace_agent_handoff
handoff_id: agent_handoff_2026-07-03-reviewer-notification-v0.3
created_at: "2026-07-03T01:50:00Z"

source_receipt:
  receipt_id: otr_2026-07-03-human-review-gate-v0.5
  receipt_schema_version: "0.5.0"
  receipt_reference: "origin-trace-receipt-standard/examples/origin-trace-receipt.example.yaml"
  receipt_status: draft

agent_context:
  agent_id: agent_origin_trace_router_v0.3
  agent_type: routing_agent
  agent_role: >-
    Reads an Origin Trace Receipt, checks the Human Review Gate, authorizes
    safe downstream routes, prepares reviewer notifications, and records
    routing recommendations.
  autonomy_level: recommendation_only

intake:
  intake_id: intake_origin_trace_receipt_v0.5
  intake_status: parsed
  receipt_layers_detected:
    - origin
    - trace
    - transformation
    - evidence
    - transformation_diff
    - audit
    - royalty_hook
    - royalty_handoff
    - human_review_gate
    - boundary
    - handoff
    - validation
  missing_layers: []
  intake_summary: >-
    The v0.5 Origin Trace Receipt was parsed successfully. All expected first
    arc layers were detected, including the Human Review Gate and royalty
    handoff routing information.

gate_check:
  gate_check_id: gate_check_origin_trace_receipt_v0.5
  human_review_gate_status: required
  decision_status: pending

  blocking_conditions_detected:
    - condition_id: condition_missing_recipient_identity
      condition_type: missing_recipient_identity
      severity: high
      blocks_actions:
        - royalty_execution
        - external_settlement

    - condition_id: condition_market_registration_review
      condition_type: market_registration
      severity: medium
      blocks_actions:
        - market_registration
        - public_claim

    - condition_id: condition_custom_license_policy
      condition_type: custom_policy
      severity: medium
      blocks_actions:
        - license_publication
        - commercial_use
        - training_use

  permitted_actions:
    - archive_only
    - attribution_publication
    - royalty_handoff

  blocked_actions:
    - market_registration
    - license_publication
    - commercial_use
    - training_use
    - royalty_execution
    - external_settlement
    - public_origin_claim
    - agent_auto_handoff

  gate_summary: >-
    Human review is required and still pending. The agent may record and
    recommend routing, but must not execute settlement, market registration,
    license publication, public origin claims, training approval, or autonomous
    external handoff.

routing:
  routing_id: routing_origin_trace_receipt_v0.5
  routing_status: ready_for_manual_review

  candidate_targets:
    - target_id: target_sync_audit
      target_protocol: synchronization-audit-protocol
      target_purpose: audit
      routing_readiness: ready
      routing_notes: >-
        The receipt may be passed to synchronization audit for deeper similarity
        or derivation review.

    - target_id: target_origin_market
      target_protocol: origin-structure-market
      target_purpose: market_registration
      routing_readiness: manual_review_required
      routing_notes: >-
        Market registration is blocked until Human Review Gate approval.

    - target_id: target_license_registry
      target_protocol: origin-license-policy-registry
      target_purpose: licensing
      routing_readiness: manual_review_required
      routing_notes: >-
        License publication requires review because commercial and training
        status are restricted.

    - target_id: target_compute_royalty
      target_protocol: compute-access-royalty-os
      target_purpose: royalty_review
      routing_readiness: manual_review_required
      routing_notes: >-
        Royalty review may proceed, but execution is blocked until recipient
        identity and settlement details are complete.

  selected_targets:
    - target_sync_audit
    - target_compute_royalty

  routing_summary: >-
    The agent recommends synchronization audit and royalty review as safe next
    steps. Market registration, license publication, and external settlement
    remain blocked until human review is completed.

route_authorization:
  authorization_id: route_auth_origin_trace_receipt_v0.3
  authorization_status: partially_authorized
  authorization_mode: mixed

  authorization_records:
    - route_id: route_sync_audit
      target_id: target_sync_audit
      target_protocol: synchronization-audit-protocol
      target_purpose: audit
      authorization_decision: authorized
      gate_dependency:
        requires_human_gate_pass: false
        accepted_gate_statuses:
          - required
          - pending
          - passed
        required_decision_statuses:
          - pending
          - approved
          - approved_with_conditions
      permitted_route_actions:
        - send_to_audit_queue
        - emit_recommendation
        - archive_record
      blocked_route_actions:
        - register_market_asset
        - publish_license
        - execute_royalty
        - execute_external_settlement
        - make_public_origin_claim
      authorization_conditions:
        - condition_id: auth_condition_audit_only
          condition_summary: >-
            The route is authorized only for audit review. It must not trigger
            market registration, license publication, royalty execution, public
            origin claims, or external settlement.
      authorization_rationale: >-
        Synchronization audit is a review-oriented route and may proceed while
        the Human Review Gate is pending, as long as no sensitive downstream
        execution is performed.

    - route_id: route_compute_royalty_review
      target_id: target_compute_royalty
      target_protocol: compute-access-royalty-os
      target_purpose: royalty_review
      authorization_decision: conditionally_authorized
      gate_dependency:
        requires_human_gate_pass: false
        accepted_gate_statuses:
          - required
          - pending
          - passed
        required_decision_statuses:
          - pending
          - approved
          - approved_with_conditions
      permitted_route_actions:
        - send_to_human_review_queue
        - create_review_ticket
        - emit_recommendation
        - notify_reviewer
      blocked_route_actions:
        - execute_royalty
        - execute_external_settlement
        - auto_forward_external
      authorization_conditions:
        - condition_id: auth_condition_review_only
          condition_summary: >-
            Royalty review may be recommended, but royalty execution is blocked
            until recipient identity and Human Review Gate approval are complete.
      authorization_rationale: >-
        The route is allowed only as a review route. It cannot execute payment
        or settlement because the source receipt still has missing recipient
        identity and pending human review.

    - route_id: route_origin_market_registration
      target_id: target_origin_market
      target_protocol: origin-structure-market
      target_purpose: market_registration
      authorization_decision: blocked
      gate_dependency:
        requires_human_gate_pass: true
        accepted_gate_statuses:
          - passed
        required_decision_statuses:
          - approved
          - approved_with_conditions
      permitted_route_actions:
        - create_review_ticket
        - notify_reviewer
      blocked_route_actions:
        - register_market_asset
        - make_public_origin_claim
        - auto_forward_external
      authorization_conditions:
        - condition_id: auth_condition_gate_must_pass
          condition_summary: >-
            Market registration requires a passed Human Review Gate decision
            before the agent may route the receipt for registration.
      authorization_rationale: >-
        Market registration is sensitive because it may create a public claim
        about origin or derivative status. It is blocked until review passes.

    - route_id: route_license_publication
      target_id: target_license_registry
      target_protocol: origin-license-policy-registry
      target_purpose: licensing
      authorization_decision: blocked
      gate_dependency:
        requires_human_gate_pass: true
        accepted_gate_statuses:
          - passed
        required_decision_statuses:
          - approved
          - approved_with_conditions
      permitted_route_actions:
        - create_review_ticket
        - notify_reviewer
      blocked_route_actions:
        - publish_license
        - approve_training_use
        - auto_forward_external
      authorization_conditions:
        - condition_id: auth_condition_license_review
          condition_summary: >-
            License publication and AI training approval require explicit human
            review because the source receipt marks commercial and training
            status as restricted.
      authorization_rationale: >-
        The route is blocked for publication. The agent may only create a
        review request or notify reviewers.

  authorization_summary: >-
    v0.3 preserves v0.2 route authorization behavior. Audit-oriented and
    review-oriented routing are allowed or conditionally allowed, while
    sensitive routes such as market registration, license publication, royalty
    execution, external settlement, AI training approval, and public origin
    claims remain blocked until Human Review Gate approval is recorded.

reviewer_notification:
  notification_id: review_notify_origin_trace_receipt_v0.3
  notification_status: prepared
  notification_mode: recommendation_only

  review_requests:
    - request_id: review_request_market_registration
      reviewer_role: market_operator
      review_reason: market_registration_review
      priority: high
      related_routes:
        - route_origin_market_registration
      related_blocking_conditions:
        - condition_market_registration_review
      requested_decision: approve_with_conditions
      notification_channel: manual
      safe_notification_payload:
        title: "Review required before Origin Market registration"
        summary: >-
          The source receipt is ready for review but market registration is
          blocked until the Human Review Gate passes. The agent recommends
          review of origin, evidence, transformation diff, license policy, and
          royalty handoff before any public registration occurs.
        included_fields:
          - source_receipt_id
          - receipt_schema_version
          - gate_status
          - decision_status
          - blocked_actions
          - candidate_targets
          - authorization_summary
          - routing_summary
          - evidence_summary
          - diff_summary
      blocked_payload_items:
        - private_conversation_excerpt
        - unredacted_evidence
        - unverified_origin_claim
      request_status: ready
      request_notes: >-
        The agent may prepare this notification but should not send it to an
        external system automatically. Manual review is required.

    - request_id: review_request_license_policy
      reviewer_role: legal_reviewer
      review_reason: license_policy_review
      priority: high
      related_routes:
        - route_license_publication
      related_blocking_conditions:
        - condition_custom_license_policy
      requested_decision: approve_with_conditions
      notification_channel: manual
      safe_notification_payload:
        title: "License policy review required"
        summary: >-
          License publication and AI training approval are blocked because the
          source receipt marks commercial and training status as restricted.
          A reviewer should decide whether attribution-only, restricted
          commercial use, or no-training conditions apply.
        included_fields:
          - source_receipt_id
          - receipt_schema_version
          - gate_status
          - blocked_actions
          - authorization_summary
          - boundary_summary
      blocked_payload_items:
        - private_conversation_excerpt
        - unredacted_evidence
        - sensitive_identity
      request_status: ready
      request_notes: >-
        The notification should be reviewed before publication or external
        license registry handoff.

    - request_id: review_request_royalty_execution
      reviewer_role: royalty_operator
      review_reason: missing_recipient_identity
      priority: medium
      related_routes:
        - route_compute_royalty_review
      related_blocking_conditions:
        - condition_missing_recipient_identity
      requested_decision: request_more_evidence
      notification_channel: manual
      safe_notification_payload:
        title: "Royalty review requires recipient identity"
        summary: >-
          Royalty review may proceed as a recommendation, but royalty execution
          and external settlement are blocked until recipient identity and
          settlement details are complete.
        included_fields:
          - source_receipt_id
          - gate_status
          - decision_status
          - blocked_actions
          - authorization_summary
      blocked_payload_items:
        - sensitive_identity
        - external_settlement_details
      request_status: ready
      request_notes: >-
        The agent may notify a human reviewer that recipient identity is
        missing, but must not execute payment or settlement.

  notification_summary: >-
    v0.3 prepares safe reviewer notifications for market registration,
    license policy, and royalty review. Notifications include only safe
    summary fields and explicitly block private, unredacted, sensitive, or
    unverified payload items.

action_policy:
  execution_mode: recommendation_only

  allowed_agent_actions:
    - read_receipt
    - validate_receipt
    - summarize_receipt
    - classify_gate_status
    - recommend_targets
    - emit_handoff_record
    - notify_human_reviewer
    - create_review_notification
    - prepare_safe_payload
    - request_human_review

  prohibited_agent_actions:
    - execute_payment
    - register_market_asset
    - publish_license
    - approve_training_use
    - make_public_origin_claim
    - bypass_human_review_gate
    - auto_forward_to_external_system
    - send_unredacted_private_evidence
    - notify_external_system_without_review

  policy_summary: >-
    The agent may inspect, classify, recommend, emit a handoff record, prepare
    safe reviewer notifications, and request human review. It may not execute
    sensitive actions, bypass the Human Review Gate, send unredacted private
    evidence, or notify external systems without review.

handoff_result:
  result_status: recommended
  emitted_records:
    - agent_handoff_2026-07-03-reviewer-notification-v0.3
  result_summary: >-
    A gate-aware route authorization and reviewer notification recommendation
    was recorded. Audit and royalty review routes are allowed or conditionally
    allowed, while sensitive downstream actions remain blocked. Safe reviewer
    notifications were prepared for market registration, license policy, and
    royalty review.

validation:
  validation_status: draft
